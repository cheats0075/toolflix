<!-- index.html (corrigido - premium sincronizado com backend) -->
<script>
async function syncPremium(userId){
  try{
    const res = await fetch(`/api/is-premium/${userId}`);
    const data = await res.json();
    window.isPremium = data.premium === true;
  }catch(e){
    console.error("Erro ao sincronizar premium", e);
    window.isPremium = false;
  }
}

// exemplo: chamar após login
async function onLogin(user){
  await syncPremium(user.id);
}
</script>
